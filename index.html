<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Çatı Katı Bulmacası - Grid Escape Game</title>
    <style>
        :root {
            --bg-color: #f0f4f8;
            --panel-bg: #ffffff;
            --text-color: #2c3e50;
            --border-color: #bdc3c7;
            --ladder-color: #7f8c8d;
            --door-color: #a0522d;
            --accent-color: #3498db;
            --roof-bg: #e6f7ff;
        }

        /* Night Theme */
        .theme-night {
            --bg-color: #1a1a2e;
            --panel-bg: #161625;
            --text-color: #e2e8f0;
            --border-color: #41416e;
            --ladder-color: #f1c40f;
            --door-color: #e74c3c;
            --accent-color: #9b59b6;
            --roof-bg: #0f0f23;
        }

        /* Cyberpunk Theme */
        .theme-cyber {
            --bg-color: #0d0221;
            --panel-bg: #0f0c31;
            --text-color: #00ffcc;
            --border-color: #ff007f;
            --ladder-color: #00ffcc;
            --door-color: #b500ff;
            --accent-color: #ffff00;
            --roof-bg: #0a0015;
        }

        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            transition: all 0.5s ease;
        }

        .game-container {
            background-color: var(--panel-bg);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            padding: 24px;
            max-width: 600px;
            width: 100%;
            text-align: center;
            border: 2px solid var(--border-color);
        }

        header h1 {
            font-size: 24px;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .game-status {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-size: 14px;
            font-weight: 600;
            background: rgba(0,0,0,0.04);
            padding: 8px 16px;
            border-radius: 8px;
        }

        /* Grid Layout matching the image structure */
        .building-wrapper {
            position: relative;
            margin: 0 auto 20px auto;
            width: 100%;
            max-width: 440px;
        }

        .roof-section {
            height: 80px;
            background-color: var(--roof-bg);
            border: 3px solid var(--border-color);
            border-bottom: none;
            border-top-left-radius: 12px;
            border-top-right-radius: 12px;
            position: relative;
            overflow: hidden;
        }

        /* Rain animation */
        .rain-drop {
            position: absolute;
            background: linear-gradient(transparent, var(--accent-color));
            width: 2px;
            height: 15px;
            opacity: 0.7;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% { transform: translateY(-20px); }
            100% { transform: translateY(100px); }
        }

        .clothesline {
            position: absolute;
            bottom: 15px;
            left: 10%;
            width: 80%;
            height: 2px;
            background-color: #333;
        }

        .clothing {
            position: absolute;
            bottom: 0px;
            width: 24px;
            height: 20px;
            border-radius: 4px;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .building-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 100px);
            border: 3px solid var(--border-color);
            background-color: rgba(255,255,255,0.05);
            border-bottom-left-radius: 12px;
            border-bottom-right-radius: 12px;
            position: relative;
        }

        .room {
            border: 1px solid rgba(0,0,0,0.1);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
        }

        /* Structural borders mirroring walls */
        .room.wall-left { border-left: 4px solid var(--border-color); }
        .room.wall-right { border-right: 4px solid var(--border-color); }
        .room.wall-top { border-top: 4px solid var(--border-color); }
        .room.wall-bottom { border-bottom: 4px solid var(--border-color); }

        /* Functional Elements */
        .ladder {
            position: absolute;
            width: 20px;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                var(--ladder-color),
                var(--ladder-color) 4px,
                transparent 4px,
                transparent 12px
            );
            border-left: 3px solid var(--ladder-color);
            border-right: 3px solid var(--ladder-color);
            z-index: 1;
        }

        .door {
            position: absolute;
            width: 14px;
            height: 45px;
            background-color: var(--door-color);
            bottom: 0;
            border-radius: 3px 3px 0 0;
            z-index: 2;
            box-shadow: inset -2px 0 5px rgba(0,0,0,0.3);
        }
        .door.left { left: -7px; }
        .door.right { right: -7px; }

        .trapdoor {
            position: absolute;
            width: 32px;
            height: 8px;
            background: #333;
            border-radius: 50%;
            z-index: 2;
        }
        .trapdoor.top { top: -4px; left: calc(50% - 16px); }
        .trapdoor.bottom { bottom: -4px; left: calc(50% - 16px); }

        /* Character Avatar */
        .character {
            width: 40px;
            height: 40px;
            background-color: #ff4757;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 20px;
            cursor: grab;
            position: absolute;
            z-index: 10;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: transform 0.1s ease, top 0.2s ease, left 0.2s ease;
            touch-action: none;
        }

        .character:active {
            cursor: grabbing;
            transform: scale(1.1);
        }

        /* Controls & Nav */
        .controls-panel {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            background-color: var(--accent-color);
            color: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: all 0.2s ease;
        }

        button:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        button.secondary {
            background-color: #7f8c8d;
        }

        /* Level Win Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 16px;
            text-align: center;
            max-width: 400px;
            color: #2c3e50;
        }

        .modal h2 { margin-bottom: 12px; color: #2ecc71; }
        .modal p { margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="game-container">
        <header>
            <h1 id="theme-title">Tema: Yağmurlu Çatı Katı</h1>
            <div class="game-status">
                <span id="level-indicator">Seviye: 1 / 3</span>
                <span id="move-counter">Hamle: 0</span>
            </div>
        </header>

        <div class="building-wrapper">
            <!-- Roof zone -->
            <div class="roof-section" id="roof">
                <div class="clothesline"></div>
                <div class="clothing" style="left: 25%; background-color: #f1c40f;">👕</div>
                <div class="clothing" style="left: 50%; background-color: #2ecc71;">👗</div>
                <div class="clothing" style="left: 75%; background-color: #e74c3c;">🎽</div>
            </div>

            <!-- Building Grid (4 columns x 4 floors) -->
            <div class="building-grid" id="grid">
                <!-- Dynamic grid injects here -->
            </div>

            <!-- Interactive Character -->
            <div class="character" id="player">🏃‍♀️</div>
        </div>

        <div class="controls-panel">
            <button class="secondary" onclick="resetLevel()">Sıfırla</button>
            <button onclick="changeTheme()">Tema Değiştir</button>
        </div>
    </div>

    <!-- Success Modal -->
    <div class="modal" id="winModal">
        <div class="modal-content">
            <h2>Tebrikler! 🎉</h2>
            <p id="winMessage">Çatıya ulaştın ve kıyafetleri kurtardın!</p>
            <button onclick="nextLevel()">Sonraki Seviye</button>
        </div>
    </div>

    <script>
        // Game configuration and mapping
        const levels = [
            {
                name: "Yağmurlu Çatı Katı (Kolay)",
                theme: "default",
                start: { r: 3, c: 3 }, // Bottom right
                target: { r: -1, c: 0 }, // Roof access from (0,0)
                grid: [
                    // Row 0 (Top floor)
                    [{lUp: true, lDown: false, dLeft: false, dRight: true}, {lUp: false, lDown: false, dLeft: true, dRight: true}, {lUp: false, lDown: false, dLeft: true, dRight: true}, {lUp: false, lDown: true, dLeft: true, dRight: false}],
                    // Row 1
                    [{lUp: false, lDown: false, dLeft: false, dRight: false}, {lUp: false, lDown: true, dLeft: false, dRight: true}, {lUp: false, lDown: false, dLeft: true, dRight: true}, {lUp: false, lDown: true, dLeft: true, dRight: false}],
                    // Row 2
                    [{lUp: false, lDown: false, dLeft: false, dRight: false}, {lUp: true, lDown: false, dLeft: false, dRight: false}, {lUp: false, lDown: true, dLeft: false, dRight: false}, {lUp: false, lDown: false, dLeft: false, dRight: false}],
                    // Row 3 (Bottom floor)
                    [{lUp: false, lDown: false, dLeft: false, dRight: false}, {lUp: false, lDown: false, dLeft: false, dRight: false}, {lUp: true, lDown: false, dLeft: false, dRight: true}, {lUp: false, lDown: false, dLeft: true, dRight: false}]
                ]
            },
            {
                name: "Gizemli Gece Apartmanı (Orta)",
                theme: "night",
                start: { r: 3, c: 0 }, // Bottom left
                target: { r: -1, c: 2 }, // Roof access from (0,2)
                grid: [
                    [{lUp: false, lDown: true, dLeft: false, dRight: true}, {lUp: false, lDown: false, dLeft: true, dRight: false}, {lUp: true, lDown: true, dLeft: false, dRight: true}, {lUp: false, lDown: false, dLeft: true, dRight: false}],
                    [{lUp: true, lDown: false, dLeft: false, dRight: true}, {lUp: false, lDown: true, dLeft: true, dRight: true}, {lUp: true, lDown: false, dLeft: true, dRight: false}, {lUp: false, lDown: true, dLeft: false, dRight: false}],
                    [{lUp: false, lDown: true, dLeft: false, dRight: false}, {lUp: true, lDown: false, dLeft: false, dRight: true}, {lUp: false, lDown: true, dLeft: true, dRight: true}, {lUp: true, lDown: false, dLeft: true, dRight: false}],
                    [{lUp: true, lDown: false, dLeft: false, dRight: true}, {lUp: false, lDown: false, dLeft: true, dRight: true}, {lUp: true, lDown: false, dLeft: true, dRight: false}, {lUp: false, lDown: false, dLeft: false, dRight: false}]
                ]
            },
            {
                name: "Siber Gelecek Kulesi (Zor)",
                theme: "cyber",
                start: { r: 3, c: 3 },
                target: { r: -1, c: 3 }, // Roof access from (0,3)
                grid: [
                    [{lUp: false, lDown: true, dLeft: false, dRight: true}, {lUp: false, lDown: false, dLeft: true, dRight: true}, {lUp: false, lDown: true, dLeft: true, dRight: true}, {lUp: true, lDown: false, dLeft: true, dRight: false}],
                    [{lUp: true, lDown: true, dLeft: false, dRight: false}, {lUp: false, lDown: true, dLeft: false, dRight: true}, {lUp: true, lDown: false, dLeft: true, dRight: false}, {lUp: false, lDown: true, dLeft: false, dRight: false}],
                    [{lUp: true, lDown: false, dLeft: false, dRight: true}, {lUp: true, lDown: false, dLeft: true, dRight: false}, {lUp: false, lDown: true, dLeft: false, dRight: true}, {lUp: true, lDown: true, dLeft: true, dRight: false}],
                    [{lUp: false, lDown: false, dLeft: false, dRight: true}, {lUp: false, lDown: false, dLeft: true, dRight: true}, {lUp: true, lDown: false, dLeft: true, dRight: true}, {lUp: true, lDown: false, dLeft: true, dRight: false}]
                ]
            }
        ];

        let currentLevelIdx = 0;
        let moves = 0;
        let playerPos = { r: 3, c: 3 };
        let isDragging = false;
        let startX, startY;

        const gridEl = document.getElementById('grid');
        const playerEl = document.getElementById('player');
        const moveCounterEl = document.getElementById('move-counter');
        const levelIndicatorEl = document.getElementById('level-indicator');
        const themeTitleEl = document.getElementById('theme-title');
        const winModal = document.getElementById('winModal');
        const roofEl = document.getElementById('roof');

        const themes = ['default', 'night', 'cyber'];
        let activeThemeIdx = 0;

        // Initialize Level layout
        function buildGrid() {
            gridEl.innerHTML = '';
            const lvl = levels[currentLevelIdx];
            playerPos = { ...lvl.start };
            
            // Set dynamic level details
            themeTitleEl.innerText = lvl.name;
            levelIndicatorEl.innerText = `Seviye: ${currentLevelIdx + 1} / ${levels.length}`;
            
            // Set dynamic theme class to body
            document.body.className = '';
            if (lvl.theme !== 'default') {
                document.body.classList.add('theme-' + lvl.theme);
                activeThemeIdx = themes.indexOf(lvl.theme);
            } else {
                activeThemeIdx = 0;
            }

            // Build structural cell elements
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    const cellData = lvl.grid[r][c];
                    const room = document.createElement('div');
                    room.className = 'room';
                    room.dataset.row = r;
                    room.dataset.col = c;

                    // Standard layout outlines matching original problem architecture
                    if (c === 0) room.classList.add('wall-left');
                    if (c === 3) room.classList.add('wall-right');
                    if (r === 0) room.classList.add('wall-top');
                    if (r === 3) room.classList.add('wall-bottom');

                    // Render connection artifacts
                    if (cellData.lDown) {
                        const ladder = document.createElement('div');
                        ladder.className = 'ladder';
                        room.appendChild(ladder);
                        const trap = document.createElement('div');
                        trap.className = 'trapdoor bottom';
                        room.appendChild(trap);
                    }
                    if (cellData.lUp) {
                        const trap = document.createElement('div');
                        trap.className = 'trapdoor top';
                        room.appendChild(trap);
                    }
                    if (cellData.dLeft && c > 0) {
                        const door = document.createElement('div');
                        door.className = 'door left';
                        room.appendChild(door);
                    }
                    if (cellData.dRight && c < 3) {
                        const door = document.createElement('div');
                        door.className = 'door right';
                        room.appendChild(door);
                    }

                    gridEl.appendChild(room);
                }
            }

            createRain();
            positionPlayer();
        }

        function createRain() {
            // Clear existing rain drops
            const existingDrops = roofEl.querySelectorAll('.rain-drop');
            existingDrops.forEach(d => d.remove());

            // Add new animated drops
            for (let i = 0; i < 20; i++) {
                const drop = document.createElement('div');
                drop.className = 'rain-drop';
                drop.style.left = `${Math.random() * 100}%`;
                drop.style.top = `${Math.random() * -50}px`;
                drop.style.animationDuration = `${0.5 + Math.random() * 0.5}s`;
                drop.style.animationDelay = `${Math.random() * 2}s`;
                roofEl.appendChild(drop);
            }
        }

        function positionPlayer() {
            if (playerPos.r === -1) {
                // Player reached the roof
                roofEl.appendChild(playerEl);
                playerEl.style.top = '25px';
                playerEl.style.left = '45%';
                checkWinCondition();
                return;
            }

            const targetRoom = document.querySelector(`[data-row="${playerPos.r}"][data-col="${playerPos.c}"]`);
            if (targetRoom) {
                targetRoom.appendChild(playerEl);
                playerEl.style.top = '30px';
                playerEl.style.left = 'calc(50% - 20px)';
            }
        }

        // Navigation validation checks
        function tryMove(targetR, targetC) {
            const currentLvl = levels[currentLevelIdx];
            
            // Check boundary limits
            if (targetC < 0 || targetC > 3 || targetR < -1 || targetR > 3) return false;

            // Handle roof logic jump
            if (targetR === -1) {
                const currentCell = currentLvl.grid[playerPos.r][playerPos.c];
                if (currentCell.lUp && playerPos.c === currentLvl.target.c && playerPos.r === 0) {
                    playerPos.r = targetR;
                    moves++;
                    updateStatus();
                    positionPlayer();
                    return true;
                }
                return false;
            }

            // Normal logic cell traversal check
            const currentCell = currentLvl.grid[playerPos.r][playerPos.c];
            
            // Horizontal move checks
            if (playerPos.r === targetR) {
                if (targetC === playerPos.c + 1 && currentCell.dRight) {
                    playerPos.c = targetC;
                    moves++;
                } else if (targetC === playerPos.c - 1 && currentCell.dLeft) {
                    playerPos.c = targetC;
                    moves++;
                } else {
                    return false;
                }
            } 
            // Vertical move checks
            else if (playerPos.c === targetC) {
                if (targetR === playerPos.r + 1 && currentCell.lDown) {
                    playerPos.r = targetR;
                    moves++;
                } else if (targetR === playerPos.r - 1 && currentCell.lUp) {
                    playerPos.r = targetR;
                    moves++;
                } else {
                    return false;
                }
            } else {
                return false;
            }

            updateStatus();
            positionPlayer();
            return true;
        }

        function updateStatus() {
            moveCounterEl.innerText = `Hamle: ${moves}`;
        }

        function checkWinCondition() {
            const lvl = levels[currentLevelIdx];
            if (playerPos.r === lvl.target.r) {
                setTimeout(() => {
                    winModal.style.display = 'flex';
                }, 300);
            }
        }

        function nextLevel() {
            winModal.style.display = 'none';
            if (currentLevelIdx < levels.length - 1) {
                currentLevelIdx++;
                moves = 0;
                updateStatus();
                buildGrid();
            } else {
                alert("Harika! Tüm temalardaki zorlu çatı katı bulmacalarını tamamladın!");
                currentLevelIdx = 0;
                moves = 0;
                updateStatus();
                buildGrid();
            }
        }

        function resetLevel() {
            moves = 0;
            updateStatus();
            buildGrid();
        }

        function changeTheme() {
            activeThemeIdx = (activeThemeIdx + 1) % themes.length;
            document.body.className = '';
            if (themes[activeThemeIdx] !== 'default') {
                document.body.classList.add('theme-' + themes[activeThemeIdx]);
            }
        }

        // Handle Drag / Slide gestures on desktop and touch devices
        function handleStart(e) {
            isDragging = true;
            const clientX = e.clientX || e.touches[0].clientX;
            const clientY = e.clientY || e.touches[0].clientY;
            startX = clientX;
            startY = clientY;
        }

        function handleEnd(e) {
            if (!isDragging) return;
            isDragging = false;

            const clientX = e.clientX || e.changedTouches[0].clientX;
            const clientY = e.clientY || e.changedTouches[0].clientY;

            const diffX = clientX - startX;
            const diffY = clientY - startY;

            // Determine primary direction threshold
            if (Math.abs(diffX) > Math.abs(diffY)) {
                if (Math.abs(diffX) > 30) { // threshold
                    if (diffX > 0) tryMove(playerPos.r, playerPos.c + 1); // Right
                    else tryMove(playerPos.r, playerPos.c - 1); // Left
                }
            } else {
                if (Math.abs(diffY) > 30) {
                    if (diffY > 0) tryMove(playerPos.r + 1, playerPos.c); // Down
                    else tryMove(playerPos.r - 1, playerPos.c); // Up
                }
            }
        }

        // Attach events to player avatar element
        playerEl.addEventListener('mousedown', handleStart);
        document.addEventListener('mouseup', handleEnd);

        playerEl.addEventListener('touchstart', handleStart, { passive: true });
        document.addEventListener('touchend', handleEnd, { passive: true });

        // Initialize game on load
        buildGrid();
    </script>
</body>
</html>
