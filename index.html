:root {

    --ladder: #d97706;
    --door: #fbbf24;
    --accent: #6366f1;
    --roof: #e0f2fe;
    --danger: #ef4444;
    --ok: #10b981;
    --shadow: 0 20px 40px -15px rgba(15, 23, 42, 0.08);
}
@media(prefers-color-scheme:dark) {
    :root {

.theme-night { --accent: #8b5cf6; --roof: #1e1b4b; }
.theme-cyber { --bg: #03000a; --panel: rgba(13, 10, 28, 0.8); --text: #00f5d4; --border: #7b2cbf; --wall: #9d4edd; --ladder: #00f5d4; --accent: #ff007f; --roof: #140126; }
.theme-hot { --bg: #1c0505; --panel: rgba(31, 24, 24, 0.85); --text: #ffe4e6; --border: #ea580c; --wall: #9a3412; --ladder: #f97316; --accent: #dc2626; --roof: #ffedd5; }
.theme-flood1, .theme-flood2, .theme-flood3, .theme-flood4, .theme-flood5 { --accent: #0284c7; }

* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', system-ui, sans-serif; user-select: none; -webkit-tap-highlight-color: transparent; }
body { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; background: radial-gradient(1200px 800px at 20% 0%, cubic-bezier(0.16, 1, 0.3, 1), rgba(99, 102, 241, 0.15) 0%, transparent 50%), var(--bg); color: var(--text); transition: background 0.4s ease, color 0.4s ease; overflow-x: hidden; }

.game { background: var(--panel); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border: 1px solid var(--border); border-radius: 32px; box-shadow: var(--shadow); padding: 24px; width: 100%; max-width: 420px; transition: transform 0.3s ease; outline: none; }
h1 { font-family: 'Outfit', sans-serif; font-weight: 900; font-size: 24px; text-align: center; background: linear-gradient(135deg, var(--accent), #22d3ee); -webkit-background-clip: text; color: transparent; letter-spacing: -0.5px; margin-bottom: 2px; }
h2 { font-size: 13px; text-align: center; color: var(--danger); margin-bottom: 16px; font-weight: 700; opacity: 0.9; letter-spacing: 0.2px; }

.status { display: flex; justify-content: space-between; background: rgba(0,0,0,0.03); padding: 10px 16px; border-radius: 16px; font-size: 13px; font-weight: 800; margin-bottom: 16px; border: 1px solid rgba(0,0,0,0.02); }
@media(prefers-color-scheme:dark) { .status { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.02); } }

.wrap { position: relative; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px -10px rgba(0,0,0,0.1); }
.roof { height: 90px; background: linear-gradient(180deg, var(--roof), rgba(0,0,0,0.02)); border: 1px solid var(--border); border-bottom: 0; border-radius: 20px 20px 0 0; position: relative; overflow: hidden; }
.line { position: absolute; bottom: 24px; left: 5%; width: 90%; height: 2px; background: rgba(0,0,0,0.1); border-radius: 2px; }
@media(prefers-color-scheme:dark) { .line { background: rgba(255,255,255,0.1); } }

.cloth { position: absolute; bottom: 6px; font-size: 24px; animation: sway 3.5s ease-in-out infinite; transform-origin: top center; }
@keyframes sway { 0%, 100% { transform: rotate(-5deg); } 50% { transform: rotate(5deg); } }

.target { position: absolute; bottom: 12px; font-size: 32px; animation: pulse 2s infinite ease-in-out; }
@keyframes pulse { 0%, 100% { transform: scale(1); filter: drop-shadow(0 0 0px transparent); } 50% { transform: scale(1.1); filter: drop-shadow(0 4px 12px rgba(0,0,0,0.15)); } }

.grid { display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(4, 84px); border: 1px solid var(--border); background: rgba(255,255,255,0.02); border-top: 0; }
.base { height: 80px; background: linear-gradient(#0284c7, #0369a1); border: 1px solid var(--border); border-top: 0; border-radius: 0 0 20px 20px; display: none; position: relative; overflow: hidden; }
.wave { position: absolute; inset: 0; background: linear-gradient(0deg, #0284c7 60%, #38bdf8); opacity: 0.85; animation: wave 4s linear infinite; width: 200%; }
@keyframes wave { 0% { transform: translateX(0); } 100% { transform: translateX(-50%) ;} }

.room { border: 1px dashed var(--wall); position: relative; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
.room.l { border-left: 1px solid var(--border); } .room.r { border-right: 1px solid var(--border); }
.room.t { border-top: 1px solid var(--border); } .room.b { border-bottom: 1px solid var(--border); }

.ladder { position: absolute; width: 18px; height: 100%; left: 50%; transform: translateX(-50%); background: repeating-linear-gradient(var(--ladder) 0 4px, transparent 4px 14px); border-left: 3px solid var(--ladder); border-right: 3px solid var(--ladder); opacity: 0.85; }
.door { position: absolute; width: 8px; height: 42px; background: var(--door); bottom: 0; border-radius: 4px 4px 0 0; opacity: 0.9; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
.door.l { left: -4px; } .door.r { right: -4px; }
.trap { position: absolute; width: 32px; height: 6px; background: #0f172a; border: 1px solid #e2e8f0; border-radius: 3px; left: 50%; transform: translateX(-50%); z-index: 2; }
.trap.t { top: -3px; } .trap.b { bottom: -3px; }

.man { width: 44px; height: 44px; background: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; position: absolute; z-index: 10; box-shadow: 0 8px 20px rgba(0,0,0,0.15); transition: all 0.22s cubic-bezier(0.34, 1.56, 0.64, 1); border: 2px solid var(--accent); }
@media(prefers-color-scheme:dark) { .man { background: #1e293b; } }

.row { display: flex; gap: 8px; }
