<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Çatı Katı Kurtarma Bulmacası | 2026 Edition</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-1: oklch(96% 0.02 250);
            --bg-2: oklch(92% 0.03 200);
            --panel-bg: oklch(100% 0 0 / 0.6);
            --panel-border: oklch(80% 0.02 250 / 0.4);
            --text: oklch(25% 0.02 250);
            --text-muted: oklch(45% 0.02 250);
            --accent: oklch(65% 0.25 260);
            --accent-2: oklch(70% 0.25 190);
            --danger: oklch(65% 0.25 25);
            --success: oklch(70% 0.2 150);
            --ladder: oklch(60% 0.1 80);
            --door: oklch(90% 0.2 95);
            --roof: oklch(85% 0.1 230);
            --radius-lg: 24px;
            --radius-md: 16px;
            --radius-sm: 10px;
            --shadow: 0 10px 30px oklch(0% 0 0 / 0.12);
            --ease: cubic-bezier(.2,.8,.2,1);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-1: oklch(20% 0.03 250);
                --bg-2: oklch(15% 0.03 200);
                --panel-bg: oklch(25% 0.02 250 / 0.5);
                --panel-border: oklch(40% 0.02 250 / 0.4);
                --text: oklch(96% 0.01 250);
                --text-muted: oklch(75% 0.01 250);
                --accent: oklch(70% 0.25 260);
                --accent-2: oklch(75% 0.25 190);
                --ladder: oklch(80% 0.15 85);
                --roof: oklch(25% 0.05 250);
            }
        }

        .theme-night {
            --accent: oklch(70% 0.25 300);
            --roof: oklch(20% 0.05 270);
        }
        .theme-cyber {
            --accent: oklch(75% 0.3 320);
            --accent-2: oklch(80% 0.3 180);
            --roof: oklch(10% 0.1 300);
            --ladder: oklch(80% 0.3 180);
        }
        .theme-hot {
            --accent: oklch(70% 0.25 30);
            --accent-2: oklch(75% 0.25 60);
            --roof: oklch(80% 0.15 50);
        }
        .theme-flood1, .theme-flood2, .theme-flood3, .theme-flood4, .theme-flood5 {
            --accent: oklch(70% 0.2 220);
            --accent-2: oklch(75% 0.2 200);
        }

        * {
            box-sizing: border-box;
            font-family: 'Inter', system-ui, sans-serif;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: radial-gradient(120% 120% at 0% 0%, var(--bg-2), transparent 50%),
                        radial-gradient(120% 120% at 100% 100%, var(--accent-2) / 0.2, transparent 50%),
                        var(--bg-1);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            transition: background 0.6s var(--ease);
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: -1;
        }

        .game-container {
            background: var(--panel-bg);
            backdrop-filter: blur(20px) saturate(1.2);
            -webkit-backdrop-filter: blur(20px) saturate(1.2);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            padding: 24px;
            max-width: 460px;
            width: 100%;
            text-align: center;
            border: 1px solid var(--panel-border);
            outline: none;
            transition: all 0.4s var(--ease);
        }

        header h1 { 
            font-family: 'Outfit', sans-serif;
            font-size: 20px; 
            margin-bottom: 4px;
            font-weight: 700;
            background: linear-gradient(90deg, var(--accent), var(--accent-2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        header h2 { 
            font-size: 12px; 
            margin-bottom: 14px; 
            opacity: 0.9; 
            font-weight: 600; 
            color: var(--danger);
            letter-spacing: 0.3px;
        }

        .game-status {
            display: flex;
            justify-content: space-between;
            margin-bottom: 16px;
            font-size: 13px;
            font-weight: 600;
            background: oklch(0% 0 0 / 0.04);
            padding: 8px 14px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--panel-border);
        }

        .building-wrapper {
            position: relative;
            margin: 0 auto;
            width: 100%;
            cursor: pointer;
        }

        .roof-section {
            height: 84px;
            background: linear-gradient(180deg, var(--roof), oklch(from var(--roof) l c h / 0.7));
            border: 1px solid var(--panel-border);
            border-bottom: none;
            border-top-left-radius: var(--radius-md);
            border-top-right-radius: var(--radius-md);
            position: relative;
            overflow: hidden;
        }

        .clothesline { 
            position: absolute; 
            bottom: 24px; 
            left: 10%; 
            width: 80%; 
            height: 2px; 
            background: oklch(40% 0.02 250 / 0.6);
            border-radius: 2px;
        }
        .clothing { 
            position: absolute; 
            bottom: 8px; 
            font-size: 22px; 
            filter: drop-shadow(0 2px 4px oklch(0% 0 0 / 0.2));
            animation: sway 3s ease-in-out infinite;
        }
        .clothing:nth-child(3) { animation-delay: -1s; }
        .clothing:nth-child(4) { animation-delay: -2s; }

        @keyframes sway {
            0%, 100% { transform: rotate(-3deg); }
            50% { transform: rotate(3deg); }
        }

        .roof-target { 
            position: absolute; 
            bottom: 12px; 
            font-size: 30px; 
            z-index: 5;
            filter: drop-shadow(0 0 8px var(--danger) / 0.6);
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }

        .building-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 88px);
            border: 1px solid var(--panel-border);
            background: oklch(0% 0 0 / 0.02);
            position: relative;
            border-radius: 0 0 var(--radius-md) var(--radius-md);
            overflow: hidden;
        }

        .basement-section {
            height: 78px;
            background: linear-gradient(180deg, oklch(60% 0.2 230), oklch(50% 0.2 230));
            border: 1px solid var(--panel-border);
            border-top: none;
            border-bottom-left-radius: var(--radius-md);
            border-bottom-right-radius: var(--radius-md);
            position: relative;
            overflow: hidden;
            display: none;
        }

        .water-wave {
            position: absolute;
            bottom: 0; left: 0; width: 200%; height: 100%;
            background: linear-gradient(0deg, oklch(55% 0.2 230 / 0.9) 70%, oklch(75% 0.15 220 / 0.6) 100%);
            animation: wave 4s ease-in-out infinite;
        }

        @keyframes wave {
            0% { transform: translateX(0) translateY(0) scaleY(1); }
            50% { transform: translateX(-25%) translateY(4px) scaleY(1.05); }
            100% { transform: translateX(-50%) translateY(0) scaleY(1); }
        }

        .room { 
            border: 1px solid oklch(from var(--text) l c h / 0.15); 
            position: relative; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background: oklch(100% 0 0 / 0.02);
        }
        .room.left-edge { border-left: 1px solid var(--panel-border); }
        .room.right-edge { border-right: 1px solid var(--panel-border); }
        .room.top-edge { border-top: 1px solid var(--panel-border); }
        .room.bottom-edge { border-bottom: 1px solid var(--panel-border); }

        .ladder {
            position: absolute; 
            width: 22px; 
            height: 100%; 
            left: 50%; 
            transform: translateX(-50%);
            background: repeating-linear-gradient(0deg, var(--ladder), var(--ladder) 6px, transparent 6px, transparent 14px);
            border-left: 3px solid var(--ladder); 
            border-right: 3px solid var(--ladder); 
            z-index: 2;
            border-radius: 2px;
            box-shadow: inset 0 0 0 1px oklch(0% 0 0 / 0.1);
        }

        .door { 
            position: absolute; 
            width: 14px; 
            height: 48px; 
            background: linear-gradient(90deg, var(--door), oklch(from var(--door) calc(l - 0.1) c h)); 
            bottom: 0; 
            z-index: 3; 
            border-radius: 6px 6px 0 0;
            box-shadow: 0 0 12px oklch(from var(--door) l c h / 0.4);
        }
        .door.left { left: -7px; }
        .door.right { right: -7px; }

        .trapdoor { 
            position: absolute; 
            width: 36px; 
            height: 10px; 
            background: oklch(15% 0.02 250); 
            border: 2px solid oklch(85% 0.01 250); 
            border-radius: 6px; 
            left: 50%; 
            transform: translateX(-50%); 
            z-index: 4;
            box-shadow: 0 2px 6px oklch(0% 0 0 / 0.3);
        }
        .trapdoor.top { top: -5px; }
        .trapdoor.bottom { bottom: -5px; }

        .target-marker { 
            position: absolute; 
            font-size: 28px; 
            z-index: 5;
            filter: drop-shadow(0 0 10px var(--accent) / 0.8);
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        .character {
            width: 44px; 
            height: 44px; 
            background: radial-gradient(circle at 30% 30%, oklch(from var(--danger) calc(l + 0.1) c h), var(--danger));
            border-radius: 50%;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 24px;
            position: absolute; 
            z-index: 10; 
            box-shadow: 0 6px 16px oklch(from var(--danger) l c h / 0.4),
                        inset 0 -2px 4px oklch(0% 0 0 / 0.2);
            transition: all 0.25s var(--ease);
            pointer-events: none;
            border: 2px solid oklch(100% 0 0 / 0.3);
        }

        .controls-dpad {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 20px 0 8px 0;
            gap: 6px;
        }
        .dpad-row { display: flex; gap: 6px; }
        
        .btn-dpad {
            width: 52px; 
            height: 52px; 
            background: linear-gradient(180deg, var(--accent), oklch(from var(--accent) calc(l - 0.08) c h));
            color: white; 
            border: none; 
            border-radius: var(--radius-md); 
            cursor: pointer; 
            display: flex; 
            align-items: center;
            justify-content: center; 
            box-shadow: 0 4px 12px oklch(from var(--accent) l c h / 0.3),
                        inset 0 1px 0 oklch(100% 0 0 / 0.2);
            transition: all 0.15s var(--ease);
            position: relative;
            overflow: hidden;
        }
        .btn-dpad:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 6px 16px oklch(from var(--accent) l c h / 0.4),
                        inset 0 1px 0 oklch(100% 0 0 / 0.2);
        }
        .btn-dpad:active { 
            transform: scale(0.95) translateY(0); 
            filter: brightness(0.9); 
        }
        .btn-dpad svg { width: 22px; height: 22px; }
        .dpad-spacer { width: 52px; height: 52px; }

        .system-buttons { 
            display: flex; 
            gap: 12px; 
            margin-top: 14px; 
        }
        .btn-sys { 
            flex: 1; 
            padding: 12px; 
            border: 1px solid var(--panel-border);
            border-radius: var(--radius-sm); 
            font-weight: 600; 
            cursor: pointer; 
            background: var(--panel-bg);
            color: var(--text); 
            transition: all 0.2s var(--ease); 
            font-size: 13px;
            backdrop-filter: blur(10px);
        }
        .btn-sys.primary { 
            background: linear-gradient(180deg, var(--success), oklch(from var(--success) calc(l - 0.08) c h));
            color: white;
            border: none;
            box-shadow: 0 4px 12px oklch(from var(--success) l c h / 0.3);
        }
        .btn-sys:hover { 
            transform: translateY(-1px);
            box-shadow: 0 4px 12px oklch(0% 0 0 / 0.1);
        }
        .btn-sys.primary:hover {
            box-shadow: 0 6px 16px oklch(from var(--success) l c h / 0.4);
        }
        
        .tip { 
            margin-top: 12px; 
            font-size: 11px; 
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }

        .modal { 
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: oklch(0% 0 0 / 0.5);
            backdrop-filter: blur(8px);
            align-items: center; 
            justify-content: center; 
            z-index: 100;
            animation: fadeIn 0.3s var(--ease);
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .modal-content { 
            background: var(--panel-bg);
            backdrop-filter: blur(30px) saturate(1.3);
            color: var(--text); 
            padding: 32px; 
            border-radius: var(--radius-lg); 
            text-align: center; 
            max-width: 380px; 
            width: calc(100% - 40px);
            border: 1px solid var(--panel-border);
            box-shadow: var(--shadow);
            animation: slideUp 0.4s var(--ease);
        }
        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .modal h2, .modal h3 { 
            font-family: 'Outfit', sans-serif;
            color: var(--success); 
            margin-bottom: 10px; 
            font-size: 22px; 
        }
        .modal p { 
            margin-bottom: 18px; 
            font-size: 14px;
            color: var(--text-muted);
            line-height: 1.5;
        }
        .modal button { 
            padding: 12px 24px; 
            background: linear-gradient(180deg, var(--accent), oklch(from var(--accent) calc(l - 0.08) c h));
            color: white; 
            border: none; 
            border-radius: var(--radius-sm); 
            font-weight: 600; 
            cursor: pointer;
            box-shadow: 0 4px 12px oklch(from var(--accent) l c h / 0.3);
            transition: all 0.2s var(--ease);
        }
        .modal button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px oklch(from var(--accent) l c h / 0.4);
        }

        .lingo-box {
            width: 46px; 
            height: 46px; 
            border: 2px solid var(--panel-border);
            display: flex; 
            align-items: center; 
            justify-content: center;
            font-weight: 700; 
            font-size: 20px; 
            border-radius: var(--radius-sm);
            text-transform: uppercase; 
            color: var(--text); 
            background: oklch(0% 0 0 / 0.03);
            transition: all 0.3s var(--ease);
        }
        .lingo-input-style {
            width: 100%; 
            padding: 14px; 
            text-align: center; 
            font-size: 22px;
            text-transform: uppercase; 
            letter-spacing: 8px; 
            border: 2px solid var(--panel-border);
            border-radius: var(--radius-sm); 
            margin-bottom: 12px; 
            background: oklch(0% 0 0 / 0.03);
            color: var(--text); 
            outline: none; 
            font-weight: 700;
            transition: all 0.2s var(--ease);
        }
        .lingo-input-style:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px oklch(from var(--accent) l c h / 0.2);
        }
    </style>
</head>
<body>
    <div class="game-container" id="gameContainer" tabindex="0">
        <header>
            <h1 id="level-name">Yükleniyor...</h1>
            <h2 id="level-task">Görev: Çatıya tırman!</h2>
            <div class="game-status">
                <span id="level-idx">Seviye: 1</span>
                <span id="moves">Hamle: 0</span>
            </div>
        </header>

        <div class="building-wrapper" onclick="document.getElementById('gameContainer').focus()">
            <div class="roof-section" id="roof">
                <div class="clothesline" id="clothesline"></div>
                <div class="clothing" style="left: 20%;">👕</div>
                <div class="clothing" style="left: 45%;">👗</div>
                <div class="clothing" style="left: 70%;">🎽</div>
                <div class="roof-target" id="roof-grandpa" style="display:none; left: 45%;">👴🔥</div>
            </div>

            <div class="building-grid" id="grid"></div>

            <div class="basement-section" id="basement">
                <div class="water-wave"></div>
                <div class="target-marker" id="kitten-target">🐱</div>
            </div>

            <div class="character" id="player">🏃‍♀️</div>
        </div>

        <div class="controls-dpad">
            <div class="dpad-row">
                <button class="btn-dpad" onclick="move(-1, 0)" aria-label="Yukarı">
                    <i data-lucide="chevron-up"></i>
                </button>
            </div>
            <div class="dpad-row">
                <button class="btn-dpad" onclick="move(0, -1)" aria-label="Sol">
                    <i data-lucide="chevron-left"></i>
                </button>
                <div class="dpad-spacer"></div>
                <button class="btn-dpad" onclick="move(0, 1)" aria-label="Sağ">
                    <i data-lucide="chevron-right"></i>
                </button>
            </div>
            <div class="dpad-row">
                <button class="btn-dpad" onclick="move(1, 0)" aria-label="Aşağı">
                    <i data-lucide="chevron-down"></i>
                </button>
            </div>
        </div>

        <div class="system-buttons">
            <button class="btn-sys" onclick="resetLevel()">
                <i data-lucide="rotate-ccw" style="width:14px;height:14px;margin-right:4px;vertical-align:-2px;"></i>
                Sıfırla
            </button>
            <button class="btn-sys primary" onclick="skipLevel()">
                <i data-lucide="skip-forward" style="width:14px;height:14px;margin-right:4px;vertical-align:-2px;"></i>
                Seviye Atla
            </button>
        </div>
        <p class="tip">
            <i data-lucide="keyboard" style="width:12px;height:12px;"></i>
            Yön Tuşları / WASD ile de oynayabilirsin
        </p>
    </div>

    <div class="modal" id="winModal">
        <div class="modal-content">
            <h2 id="modal-title">Harika İş! 🎉</h2>
            <p id="modal-desc">Kıyafetleri ıslanmaktan kurtardın!</p>
            <button id="next-btn" onclick="loadNextLevel()">Sonraki Seviye</button>
        </div>
    </div>

    <div class="modal" id="lingoModal">
        <div class="modal-content">
            <h3>🔐 Şifreli Elektronik Kilit</h3>
            <p id="lingo-hint" style="font-weight: 600; font-size:13px; color: var(--danger); margin-top:5px;"></p>
            
            <div id="lingo-grid" style="display: flex; flex-direction: column; gap: 6px; align-items: center; margin: 18px 0;"></div>
            
            <input type="text" id="lingo-input" class="lingo-input-style" autocomplete="off" onkeydown="if(event.key === 'Enter') checkLingoGuess()">
            <button class="btn-sys primary" style="width:100%; padding: 14px;" onclick="checkLingoGuess()">
                Şifreyi Gönder
            </button>
            <p id="lingo-error" style="color: var(--danger); font-size: 12px; margin-top: 10px; font-weight: 600;"></p>
        </div>
    </div>

    <script>
        lucide.createIcons();
        
        const levels = [
            {
                name: "1. Kat: Yağmurlu Çatı Katı", task: "Görev: Yukarı tırman, kıyafetleri kurtar!", theme: "default", type: "roof",
                start: { r: 3, c: 3 }, target: { r: -1, c: 0 },
                grid: [
                    [{ up: true, down: false, left: false, right: true },  { up: false, down: false, left: true, right: true },   { up: false, down: true, left: true, right: false },   { up: false, down: false, left: false, right: false }],
                    [{ up: false, down: true, left: false, right: false }, { up: false, down: false, left: false, right: true },   { up: true, down: true, left: true, right: false },    { up: false, down: true, left: false, right: false }],
                    [{ up: true, down: false, left: false, right: true },  { up: false, down: true, left: true, right: false },    { up: true, down: false, left: false, right: true },   { up: true, down: true, left: true, right: false }],
                    [{ up: false, down: false, left: false, right: true }, { up: true, down: false, left: true, right: false },    { up: false, down: false, left: false, right: true },  { up: true, down: false, left: true, right: false }]
                ]
            },
            {
                name: "2. Kat: Gizemli Gece", task: "Görev: Yukarı tırman, kıyafetleri kurtar!", theme: "night", type: "roof",
                start: { r: 3, c: 0 }, target: { r: -1, c: 2 },
                grid: [
                    [{ up: false, down: true, left: false, right: true },  { up: false, down: false, left: true, right: false },   { up: true, down: true, left: false, right: true },   { up: false, down: false, left: true, right: false }],
                    [{ up: true, down: false, left: false, right: true },  { up: false, down: true, left: true, right: true },     { up: true, down: false, left: true, right: false },  { up: false, down: true, left: false, right: false }],
                    [{ up: false, down: true, left: false, right: false }, { up: true, down: false, left: false, right: true },    { up: false, down: true, left: true, right: true },   { up: true, down: false, left: true, right: false }],
                    [{ up: true, down: false, left: false, right: true },  { up: false, down: false, left: true, right: true },    { up: true, down: false, left: true, right: false },  { up: false, down: false, left: false, right: false }]
                ]
